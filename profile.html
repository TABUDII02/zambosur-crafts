<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Profile | ZamboSur Crafts</title>
    <link rel="stylesheet" href="products-styles.css"> 
    <link rel="stylesheet" href="profile-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="malongs-styles.css">
</head>
<body>

    <nav class="navbar" id="mainNav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">ZamboSur<span>Crafts</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="allproducts-dashboard.html">Products</a>
                <a href="#about-us">About Us</a>
            </div>
        </div>
    </nav>

    <div class="profile-page-wrapper">
        <div class="profile-container">
            <aside class="profile-sidebar">
                <div class="avatar-circle" id="avatarIcon">?</div>
                <h2 id="sideName">Loading...</h2>
                <p id="sideEmail">---</p>
                
                <nav class="side-menu">
                    <p class="menu-label">My Account</p>
                    <a href="profile.html" class="active"><i class="fas fa-user"></i> Personal Information</a>
                    <a href="security.html" ><i class="fas fa-shield-alt"></i> Account Security</a>
                    <a href="addresses.html"><i class="fas fa-map-marker-alt"></i> Address Book</a>
                    
                    <p class="menu-label">Orders & Activity</p>
                    <a href="orders.html"><i class="fas fa-box"></i> Order History</a>
                    <a href="wishlist.html"><i class="fas fa-heart"></i> Wishlist</a>
                    <a href="cart.html"><i class="fas fa-shopping-cart"></i>Shopping Cart</a>
                    
                    <p class="menu-label">Preferences</p>
                    <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
                    <hr>
                    <a href="#" class="logout-link" id="logoutTrigger"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </nav>
                </nav>
            </aside>

            <main class="profile-main-content">
                <header class="content-header">
                    <h1>My Profile</h1>
                    <button class="edit-profile-btn" id="editBtn">Edit Info</button>
                </header>

                <div class="info-card">
                    <div class="info-row">
                        <label>Full Name</label>
                        <p id="dbName">---</p>
                    </div>
                    <div class="info-row">
                        <label>Email Address</label>
                        <p id="dbEmail">---</p>
                    </div>
                    <div class="info-row">
                        <label>Phone Number</label>
                        <p id="dbPhone">---</p>
                    </div>
                    <div class="info-row">
                        <label>Default Shipping Address</label>
                        <p id="dbAddress">---</p>
                    </div>
                    <div class="info-row">
                        <label>Member Since</label>
                        <p id="dbJoined">---</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="profile-logic.js"></script>
</body>
</html>
