<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | ZamboSur Crafts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --text-main: #111827;
            --text-muted: #6b7280;
            --bg: #f9fafb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .success-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #ecfdf5;
            color: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
        }

        h1 { font-size: 24px; color: var(--text-main); margin: 0 0 10px; }
        p { color: var(--text-muted); line-height: 1.6; margin-bottom: 30px; }

        .order-badge {
            background: #f3f4f6;
            padding: 12px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .order-badge span {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .order-badge strong {
            font-size: 18px;
            color: var(--primary);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: #4338ca; }

        .btn-outline {
            background: white;
            color: var(--text-main);
            border: 1px solid #d1d5db;
        }

        .btn-outline:hover { background: #f9fafb; }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-box">
            <i class="fas fa-check-circle"></i>
        </div>
        
        <h1>Order Confirmed!</h1>
        <p>Thank you for supporting our local artisans. Your order is being processed and will be ready soon.</p>

        <div class="order-badge">
            <span>Order Number</span>
            <strong id="orderIDDisplay">#0000</strong>
        </div>

        <div class="actions">
            <a href="index.html" class="btn btn-primary">Continue Shopping</a>
            <a href="orders.html" class="btn btn-outline">View My Orders</a>
        </div>
    </div>

    <script>
        // Get the Order ID from the URL (e.g., order-success.html?id=25)
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');

        if (orderId) {
            document.getElementById('orderIDDisplay').textContent = "#" + orderId;
        } else {
            document.getElementById('orderIDDisplay').textContent = "Confirmed";
        }
    </script>

</body>
</html>
