<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZamboSur Crafts - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-layout">
    <nav class="sidebar">
        <div class="sidebar-brand">
            <h2>🌿 ZamboSur <span>Crafts</span></h2>
        </div>
        <ul class="sidebar-menu">
    <li class="active" onclick="showSection('productsSection', this, event)">
        <a href="#"><i class="fas fa-box"></i> Products</a>
    </li>
    <li onclick="showSection('categoriesSection', this, event)">
        <a href="#"><i class="fas fa-list-ul"></i> Categories</a>
    </li>
    <li onclick="showSection('ordersSection', this, event)">
        <a href="#"><i class="fas fa-shopping-cart"></i> Orders</a>
    </li>
    <li onclick="showSection('usersSection', this, event)">
    <a href="#"><i class="fas fa-users"></i> Users</a>
</li>
    <li class="logout-item" onclick="handleLogout()">
        <a href="#"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </li>
</ul>
    </nav>

    <main class="main-content">
    <div id="productsSection" class="content-body card">
        <header class="top-bar">
            <h1>📦 Products Dashboard</h1>
            <br>
            <div class="top-actions">
                <button class="btn btn-primary" onclick="openAddModal()">➕ Add Product</button>
            </div>
        </header>
        <div id="productsTable" class="table-container"></div>
    </div>

    <div id="categoriesSection" class="content-body card" style="display:none;">
        <header class="top-bar">
            <h1>📂 Category Management</h1>
            <br>
            <div class="top-actions">
                <button class="btn btn-primary" onclick="openAddCategoryModal()">➕ New Category</button>
            </div>
        </header>
        <div id="categoriesTable" class="table-container"></div>
    </div>

    <div id="ordersSection" class="content-body card" style="display:none;">
        <header class="top-bar">
            <h1>🛒 Customer Orders</h1>
            <br>
            <div class="top-actions">
                <button class="btn btn-secondary" onclick="exportOrderReport()">📥 Export CSV</button>
            </div>
        </header>
        <div id="ordersTable" class="table-container"></div>
    </div>

    <div id="usersSection" class="content-body card" style="display:none;">
    <header class="top-bar">
        <h1>👥 Customer Profiles</h1>
        <div class="top-actions">
            <button class="btn btn-outline" onclick="loadCustomers()">🔄 Refresh List</button>
        </div>
    </header>
    <div id="usersTable" class="table-container"></div>
</div>
</main>

            <div id="editModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeEditModal()">&times;</span>
                <h2><i class="fas fa-edit"></i> Edit Product</h2>
                
                <form id="editForm">
                    <input type="hidden" id="edit-prod-id">
                    
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="edit-name" placeholder="Enter product name">
                    </div>

                    <div class="form-group">
                        <label>Price (₱)</label>
                        <input type="number" id="edit-price" placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label>Stock Quantity</label>
                        <input type="number" id="edit-stock">
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="edit-desc" rows="3"></textarea>
                    </div>

                    <button type="button" class="btn-save" onclick="saveProductEdit()">
                        Update Item
                    </button>
                </form>
            </div>
        </div>

        <div id="addProductModal" class="modal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Add New Local Craft</h2>
            <span class="close-btn" onclick="closeAddModal()">&times;</span>
        </div>
        
        <form id="addProductForm">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" placeholder="e.g. Handwoven Malong" required>
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" placeholder="Describe the craftsmanship..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Price (Php)</label>
                <input type="number" name="price" step="0.01" required>
            </div>

            <div class="form-group">
                <label>Initial Stock (Quantity)</label>
                <input type="number" name="quantity" value="0" min="0" required>
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select name="category_id" required>
                    <option value="" disabled selected>Select Category</option>
                    <option value="1">Bags</option>
                    <option value="2">Wallets</option>
                    <option value="3">Belts</option>
                    <option value="4">Accessories</option>
                    <option value="5">Jewelry</option>
                    <option value="6">Malongs</option>
                    <option value="7">Pillowcases</option>
                    <option value="8">Baskets</option>
                    <option value="9">Weavings</option>
                    <option value="10">Miniatures</option>
                </select>
            </div>

            <div class="form-group">
                <label>Product Image</label>
                <input type="file" name="image" accept="image/*" required>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Product</button>
            </div>
        </form>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
